# =============================================================================
# DATASOURCE
# =============================================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?stringtype=unspecified

# =============================================================================
# HIBERNATE ORM
# =============================================================================
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.database.default-schema=agenda
quarkus.hibernate-orm.log.sql=false

# Dev: exibir SQL no console
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.hibernate-orm.log.format-sql=true

# =============================================================================
# FLYWAY
# =============================================================================
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# =============================================================================
# HTTP / CORS
# =============================================================================
quarkus.http.port=8080
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# =============================================================================
# OPENAPI / SWAGGER UI
# =============================================================================
quarkus.smallrye-openapi.info-title=SRI Agenda API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API de gerenciamento de compromissos da agenda SRI
%dev.quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
